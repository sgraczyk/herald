name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CGO_ENABLED: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${{ github.event.release.tag_name }}" -o herald-linux-amd64 ./cmd/herald
      - uses: softprops/action-gh-release@v2
        with:
          files: herald-linux-amd64
